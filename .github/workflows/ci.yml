name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: iso_ocr
          POSTGRES_USER: iso_ocr
          POSTGRES_PASSWORD: iso_ocr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iso_ocr -d iso_ocr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run lint
